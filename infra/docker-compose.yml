version: "3.9"

services:
  # --- 数据库层 ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: qb_timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-quantbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quantbot_dev}
      POSTGRES_DB: ${DB_NAME:-quantbot}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quantbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qb_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 后端服务 ---
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: qb_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-quantbot}:${DB_PASSWORD:-quantbot_dev}@timescaledb:5432/${DB_NAME:-quantbot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- 任务队列 Worker ---
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: qb_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-quantbot}:${DB_PASSWORD:-quantbot_dev}@timescaledb:5432/${DB_NAME:-quantbot}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ../backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  # --- 前端 ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: qb_frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000

  # --- 监控 ---
  prometheus:
    image: prom/prometheus:latest
    container_name: qb_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: qb_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    profiles: ["monitoring"]

volumes:
  timescale_data:
  redis_data:
  prometheus_data:
  grafana_data:
