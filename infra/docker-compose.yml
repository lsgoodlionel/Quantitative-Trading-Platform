# QuantBot — 开发环境 (热重载)
# 用法: make dev  或  docker compose -f infra/docker-compose.yml up

services:

  # ── 数据库 ──────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: qb_db
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: qb_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 后端 (热重载) ────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: qb_backend
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME}
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  development
      # Futu OpenD 运行在宿主机 — Docker Desktop macOS/Windows 使用 host.docker.internal
      FUTU_HOST:    ${FUTU_HOST:-host.docker.internal}
      FUTU_PORT:    ${FUTU_PORT:-11111}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app/app

  # ── 前端 (Vite 热重载) ───────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: qb_frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
    environment:
      VITE_API_URL:  http://localhost:8000
      VITE_WS_URL:   ws://localhost:8000
      BACKEND_URL:   http://backend:8000
      WS_URL:        ws://backend:8000
    depends_on:
      - backend

  # ── Celery Worker（策略 + 数据任务）───────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: qb_celery_worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME}
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  development
    volumes:
      - ../backend:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker
      -Q data,strategy,default
      --concurrency=4
      --loglevel=info
    profiles: ["celery"]

  # ── Celery Beat（定时调度器）───────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: qb_celery_beat
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME}
      REDIS_URL:    redis://redis:6379/0
      ENVIRONMENT:  development
    volumes:
      - ../backend:/app
    depends_on:
      - redis
      - celery-worker
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
    profiles: ["celery"]

  # ── 监控（可选 profile）─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: qb_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:12.0.1
    container_name: qb_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]

volumes:
  timescale_data:
  redis_data:
  prometheus_data:
  grafana_data:
